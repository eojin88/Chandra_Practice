<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 이미지 분석 시스템</title>
    <style>
        /* 다크 모드 기본 스타일 */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #bb86fc;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #03dac6;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #2c2c2c;
            color: white;
            box-sizing: border-box;
        }

        /* 이미지 미리보기 스타일 */
        #previewContainer {
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        #previewImage {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 2px solid #333;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            background-color: #bb86fc;
            color: #121212;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #9965f4;
        }

        /* 로딩 애니메이션 */
        #loader {
            display: none;
            margin: 20px 0;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #03dac6;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 결과 창 스타일 */
        #resultContainer {
            margin-top: 30px;
            padding: 20px;
            background: #252525;
            border-left: 4px solid #bb86fc;
            border-radius: 4px;
            display: none;
        }

        .result-item {
            margin-bottom: 15px;
        }

        .result-label {
            font-weight: bold;
            color: #03dac6;
            margin-bottom: 5px;
        }

        .result-content {
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 이미지 분석</h1>
    
    <!-- 이미지 업로드 섹션 -->
    <div class="input-group">
        <label for="imageInput">분석할 이미지 선택</label>
        <input type="file" id="imageInput" accept="image/*">
        <div id="previewContainer">
            <img id="previewImage" src="" alt="미리보기">
        </div>
    </div>

    <!-- 질문 입력 섹션 -->
    <div class="input-group">
        <label for="questionInput">AI에게 물어볼 내용</label>
        <input type="text" id="questionInput" placeholder="예: 이 이미지에 대해 설명해줘.">
    </div>

    <button id="analyzeBtn">분석하기</button>

    <!-- 로딩 표시 -->
    <div id="loader">
        <div class="spinner"></div>
        <span>AI가 분석 중입니다...</span>
    </div>

    <!-- 결과 표시 섹션 -->
    <div id="resultContainer">
        <div class="result-item">
            <div class="result-label">추출된 텍스트/분석 결과</div>
            <div id="ocrResult" class="result-content"></div>
        </div>
        <div class="result-item">
            <div class="result-label">AI 답변</div>
            <div id="aiAnswer" class="result-content"></div>
        </div>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewImage = document.getElementById('previewImage');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loader = document.getElementById('loader');
    const resultContainer = document.getElementById('resultContainer');
    const ocrResult = document.getElementById('ocrResult');
    const aiAnswer = document.getElementById('aiAnswer');

    /**
     * 이미지 선택 시 미리보기 표시
     */
    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    /**
     * 분석하기 버튼 클릭 이벤트
     */
    analyzeBtn.addEventListener('click', async () => {
        const file = imageInput.files[0];
        const question = document.getElementById('questionInput').value;

        if (!file) {
            alert('이미지를 선택해주세요.');
            return;
        }

        // UI 초기화
        resultContainer.style.display = 'none';
        loader.style.display = 'block';
        analyzeBtn.disabled = true;

        const formData = new FormData();
        formData.append('image', file);
        formData.append('question', question);

        try {
            // Node.js 프록시 서버로 요청 전송
            const response = await fetch('/proxy-analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success !== false) {
                // 결과 표시 (데이터 구조는 FastAPI 서버 반환 값에 따라 조정 필요)
                ocrResult.innerText = data.data || "텍스트를 추출하지 못했습니다.";
                aiAnswer.innerText = data.data || "답변을 생성하지 못했습니다.";
                resultContainer.style.display = 'block';
            } else {
                alert('에러 발생: ' + data.message);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('서버와 통신 중 오류가 발생했습니다.');
        } finally {
            loader.style.display = 'none';
            analyzeBtn.disabled = false;
        }
    });
</script>

</body>
</html>
